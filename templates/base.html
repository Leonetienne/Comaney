<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Comoney{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; color: #333; background: #fff; }

        /* header */
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; border-bottom: 1px solid #ddd; }
        header .brand { font-weight: 700; font-size: 1.1rem; text-decoration: none; color: #333; }
        header nav { display: flex; align-items: center; gap: 16px; }
        header nav a { text-decoration: none; color: #333; font-size: 0.95rem; }
        header nav a:hover { text-decoration: underline; }
        header nav .user-name { font-size: 0.95rem; font-weight: 600; }
        header nav button { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 0.9rem; color: #333; }
        header nav button:hover { background: #f5f5f5; }

        /* app layout (sidebar) */
        .app-layout { display: flex; min-height: calc(100vh - 56px - 49px); }
        .sidebar { width: 220px; flex-shrink: 0; background: #f8f8f8; border-right: 1px solid #ddd; padding: 20px 0; padding-left: 12px; }
        .sidebar ul { list-style: none; margin: 0; padding: 0; }
        .sidebar ul li a { display: block; padding: 10px 24px; text-decoration: none; color: #555; font-size: 0.92rem; border-left: 3px solid transparent; }
        .sidebar ul li.active a { color: #111; font-weight: 600; border-left-color: #333; background: #efefef; }
        .sidebar ul li a:hover { color: #111; background: #efefef; }
        .sidebar-section-label { display: block; padding: 16px 24px 4px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #aaa; }
        .sidebar ul li:first-child .sidebar-section-label { padding-top: 4px; }
        .app-main { flex: 1; padding: 32px 40px; min-width: 0; }

        /* plain main (non-app pages) */
        main { max-width: 860px; margin: 40px auto; padding: 0 24px; }

        /* footer */
        footer { border-top: 1px solid #ddd; padding: 14px 24px; font-size: 0.85rem; color: #888; text-align: center; }

        /* shared form styles */
        label { display: block; margin-top: 16px; font-weight: 600; font-size: 0.95rem; }
        input[type=text], input[type=email], input[type=password], input[type=number],
        input[type=date], textarea, select { width: 100%; padding: 8px 10px; margin-top: 4px;
            border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; font-family: inherit; }
        textarea { resize: vertical; }
        select[multiple] { height: auto; }
        .error-msg { color: #c00; font-size: 0.875rem; margin-top: 4px; }
        .btn { display: inline-block; margin-top: 0; padding: 8px 18px; background: #333; color: #fff;
            border: none; border-radius: 4px; font-size: 0.95rem; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #555; }
        .btn-sm { padding: 4px 12px; font-size: 0.85rem; }
        .btn-danger { background: #c00; }
        .btn-danger:hover { background: #a00; }
        .btn-secondary { background: #fff; color: #333; border: 1px solid #ccc; }
        .btn-secondary:hover { background: #f5f5f5; }
        .btn-full { width: 100%; text-align: center; display: block; }

        /* table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid #eee; }
        th { background: #f5f5f5; font-weight: 600; font-size: 0.9rem; }
        tr:hover td { background: #fafafa; }
        .empty { color: #888; font-style: italic; margin-top: 20px; }

        /* badges */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; }
        .badge-income { background: #d4edda; color: #155724; }
        .badge-expense { background: #f8d7da; color: #721c24; }
        .badge-tag { background: #e2e3e5; color: #383d41; margin: 1px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% include "partials/_header.html" %}
    {% block layout %}
    <main>
        {% block content %}{% endblock %}
    </main>
    {% endblock %}
    {% include "partials/_footer.html" %}
</body>
</html>
