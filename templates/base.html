<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Comoney{% endblock %}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; color: #333; background: #fff; }

        /* header */
        header { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 56px; border-bottom: 1px solid #ddd; }
        header .brand { font-weight: 700; font-size: 1.1rem; text-decoration: none; color: #333; }
        header nav { display: flex; align-items: center; gap: 16px; }
        header nav a { text-decoration: none; color: #333; font-size: 0.95rem; }
        header nav a:hover { text-decoration: underline; }
        header nav .user-name { font-size: 0.95rem; font-weight: 600; }
        header nav button { background: none; border: 1px solid #ccc; border-radius: 4px; padding: 5px 12px; cursor: pointer; font-size: 0.9rem; color: #333; }
        header nav button:hover { background: #f5f5f5; }

        /* main */
        main { max-width: 860px; margin: 40px auto; padding: 0 24px; }

        /* footer */
        footer { margin-top: 60px; border-top: 1px solid #ddd; padding: 16px 24px; font-size: 0.85rem; color: #888; text-align: center; }

        /* shared form styles */
        label { display: block; margin-top: 16px; font-weight: 600; font-size: 0.95rem; }
        input[type=text], input[type=email], input[type=password] { width: 100%; padding: 8px 10px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .error-msg { color: #c00; font-size: 0.875rem; margin-top: 4px; }
        .btn { display: inline-block; margin-top: 24px; padding: 10px 20px; background: #333; color: #fff; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; text-decoration: none; }
        .btn:hover { background: #555; }
        .btn-full { width: 100%; text-align: center; }

        /* table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 10px 14px; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; font-weight: 600; }
        tr:hover td { background: #fafafa; }
        .empty { color: #888; font-style: italic; margin-top: 20px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% include "partials/_header.html" %}
    <main>
        {% block content %}{% endblock %}
    </main>
    {% include "partials/_footer.html" %}
</body>
</html>
