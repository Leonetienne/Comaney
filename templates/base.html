<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>{% block title %}Comaney{% endblock %}</title>
    <style>
        /* ── Variables ───────────────────────────────────────────────────── */
        :root {
            --bg:             #fff;
            --bg-surface:     #f8f8f8;
            --bg-elevated:    #efefef;
            --bg-input:       #fff;
            --border:         #ddd;
            --border-subtle:  #eee;
            --text:           #333;
            --text-muted:     #888;
            --text-subtle:    #555;
            --accent:         #333;
            --accent-fg:      #fff;
            --input-border:   #ccc;
            --error:          #c00;
            --error-bg:       #fff0f0;
            --error-border:   #f5c6cb;

            --sav-dep-bg:     #cce5ff;
            --sav-dep-fg:     #004085;
            --sav-wit-bg:     #fff3cd;
            --sav-wit-fg:     #856404;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg:             #141414;
                --bg-surface:     #1c1c1c;
                --bg-elevated:    #272727;
                --bg-input:       #202020;
                --border:         #333;
                --border-subtle:  #282828;
                --text:           #e0e0e0;
                --text-muted:     #666;
                --text-subtle:    #aaa;
                --accent:         #e0e0e0;
                --accent-fg:      #141414;
                --input-border:   #3a3a3a;
                --error:          #ff6b6b;
                --error-bg:       #2a1515;
                --error-border:   #4a2020;

                --sav-dep-bg:     #0d2a4a;
                --sav-dep-fg:     #7ec8f7;
                --sav-wit-bg:     #3a2e00;
                --sav-wit-fg:     #ffd966;
            }
        }

        /* ── Reset ───────────────────────────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; color: var(--text); background: var(--bg); }

        /* ── Header ──────────────────────────────────────────────────────── */
        header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; height: 56px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            position: sticky; top: 0; z-index: 200;
        }
        .header-left { display: flex; align-items: center; }
        .hamburger {
            display: none; align-items: center; justify-content: center;
            background: none; border: none; cursor: pointer; padding: 6px 8px 6px 0;
            color: var(--text); flex-direction: column; gap: 5px; margin-right: 10px;
        }
        .hamburger span { display: block; width: 20px; height: 2px; background: currentColor; border-radius: 2px; transition: transform .2s, opacity .2s; }
        body.nav-open .hamburger span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        body.nav-open .hamburger span:nth-child(2) { opacity: 0; }
        body.nav-open .hamburger span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
        header .brand { font-weight: 700; font-size: 1.1rem; text-decoration: none; color: var(--text); }
        header nav { display: flex; align-items: center; gap: 16px; }
        header nav a { text-decoration: none; color: var(--text); font-size: 0.95rem; }
        header nav a:hover { text-decoration: underline; }
        header nav .user-name { font-size: 0.95rem; font-weight: 600; color: var(--text-subtle); }
        header nav button {
            background: none; border: 1px solid var(--border); border-radius: 4px;
            padding: 5px 12px; cursor: pointer; font-size: 0.9rem; color: var(--text);
        }
        header nav button:hover { background: var(--bg-elevated); }

        /* ── App layout ──────────────────────────────────────────────────── */
        .app-layout { display: flex; min-height: calc(100vh - 56px - 45px); }

        /* Sidebar overlay */
        .sidebar-overlay {
            display: none; position: fixed; inset: 56px 0 0 0;
            background: rgba(0,0,0,.45); z-index: 149;
        }
        body.nav-open .sidebar-overlay { display: block; }

        /* Sidebar */
        .sidebar {
            width: 180px; flex-shrink: 0;
            background: var(--bg-surface); border-right: 1px solid var(--border);
            padding: 20px 0; padding-left: 12px;
        }
        .sidebar ul { list-style: none; margin: 0; padding: 0; }
        .sidebar ul li a {
            display: block; padding: 10px 24px; text-decoration: none;
            color: var(--text-subtle); font-size: 0.92rem; border-left: 3px solid transparent;
        }
        .sidebar ul li.active a { color: var(--text); font-weight: 600; border-left-color: var(--accent); background: var(--bg-elevated); }
        .sidebar ul li a:hover { color: var(--text); background: var(--bg-elevated); }
        .sidebar-section-label {
            display: block; padding: 16px 24px 4px; font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted);
        }
        .sidebar ul li:first-child .sidebar-section-label { padding-top: 4px; }

        .app-main { flex: 1; padding: 24px 28px; min-width: 0; overflow-x: hidden; }

        /* ── Plain main (auth pages) ─────────────────────────────────────── */
        main { max-width: 860px; margin: 40px auto; padding: 0 24px; }

        /* ── Footer ──────────────────────────────────────────────────────── */
        footer { border-top: 1px solid var(--border); padding: 14px 24px; font-size: 0.85rem; color: var(--text-muted); text-align: center; background: var(--bg); }

        /* ── Forms ───────────────────────────────────────────────────────── */
        label { display: block; margin-top: 16px; font-weight: 600; font-size: 0.95rem; color: var(--text); }
        input[type=text], input[type=email], input[type=password], input[type=number],
        input[type=date], textarea, select {
            width: 100%; padding: 8px 10px; margin-top: 4px;
            border: 1px solid var(--input-border); border-radius: 4px;
            font-size: 1rem; font-family: inherit;
            background: var(--bg-input); color: var(--text);
        }
        input:focus, textarea:focus, select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
        textarea { resize: vertical; }
        select[multiple] { height: auto; }
        .error-msg { color: var(--error); font-size: 0.875rem; margin-top: 4px; }

        /* ── Buttons ─────────────────────────────────────────────────────── */
        .btn {
            display: inline-block; padding: 8px 18px; margin-top: 0;
            background: var(--accent); color: var(--accent-fg);
            border: 1px solid transparent; border-radius: 4px;
            font-size: 0.95rem; cursor: pointer; text-decoration: none;
            white-space: nowrap;
        }
        .btn:hover { opacity: .82; }
        .btn-sm { padding: 4px 12px; font-size: 0.85rem; }
        .btn-danger { background: #c00; color: #fff; }
        .btn-danger:hover { background: #a00; opacity: 1; }
        .btn-secondary { background: var(--bg-input); color: var(--text); border-color: var(--input-border); }
        .btn-secondary:hover { background: var(--bg-elevated); opacity: 1; }
        .btn-full { width: 100%; text-align: center; display: block; }

        /* ── Tag checkbox pills ─────────────────────────────────────────── */
        /* display:contents collapses Django's wrapper ul/li/div so labels
           become direct flex items of .tag-cb-wrap */
        .tag-cb-wrap {
            display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px;
        }
        .tag-cb-wrap ul, .tag-cb-wrap > div { display: contents; }
        .tag-cb-wrap li, .tag-cb-wrap ul li, .tag-cb-wrap > div > div { display: contents; }
        .tag-cb-wrap label {
            display: inline-flex; align-items: center;
            padding: 4px 12px; border-radius: 20px;
            background: var(--bg-elevated); border: 1px solid var(--border);
            font-size: 0.82rem; color: var(--text-subtle);
            cursor: pointer; user-select: none;
            transition: background .12s, border-color .12s, color .12s;
        }
        .tag-cb-wrap label:hover { border-color: var(--text-muted); color: var(--text); }
        .tag-cb-wrap input[type=checkbox] { display: none; }
        .tag-cb-wrap label:has(input:checked) { background: var(--accent); color: var(--accent-fg); border-color: transparent; }

        /* ── Expense / scheduled cards ──────────────────────────────────── */
        .exp-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
        .exp-card {
            background: var(--bg-surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 16px;
            display: grid; grid-template-columns: 1fr auto;
            grid-template-rows: auto auto auto auto;
            row-gap: 5px; column-gap: 16px;
        }
        .exp-date-label { font-size: 0.78rem; color: var(--text-muted); grid-column: 1; grid-row: 1; }
        .exp-row1 {
            display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap;
            grid-column: 1; grid-row: 2;
        }
        .exp-title { font-weight: 600; font-size: 1rem; color: var(--text); }
        .exp-payee { font-size: 0.88rem; color: var(--text-muted); }
        .exp-amount { margin-left: auto; font-weight: 700; font-size: 1rem; white-space: nowrap; }
        .exp-amount.type-income      { color: #155724; }
        .exp-amount.type-expense     { color: #721c24; }
        .exp-amount.type-savings_dep { color: var(--sav-dep-fg); }
        .exp-amount.type-savings_wit { color: var(--sav-wit-fg); }
        @media (prefers-color-scheme: dark) {
            .exp-amount.type-income  { color: #6ecf8a; }
            .exp-amount.type-expense { color: #cf7075; }
        }
        .exp-actions {
            grid-column: 2; grid-row: 1 / -1;
            display: flex; flex-direction: column; gap: 6px;
            align-items: flex-end; justify-content: flex-start;
        }
        .exp-row2 {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            grid-column: 1; grid-row: 3;
        }
        .exp-settled { font-size: 0.85rem; color: var(--text-muted); }
        .exp-settled.yes { color: var(--text-subtle); }
        .exp-category { font-size: 0.85rem; color: var(--text-subtle); }
        .exp-due { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; }
        .exp-row3 { grid-column: 1; grid-row: 4; font-size: 0.82rem; color: var(--text-muted); font-style: italic; }
        .exp-row2 .sep { color: var(--border); }

        /* ── Month navigation ────────────────────────────────────────────── */
        .month-nav {
            display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
        }
        .month-nav__label {
            font-size: 1.35rem; font-weight: 700; color: var(--text); min-width: 160px; text-align: center;
        }
        .month-nav__arrow {
            display: inline-flex; align-items: center; justify-content: center;
            width: 36px; height: 36px; border-radius: 50%;
            border: 1px solid var(--border); background: var(--bg-surface);
            color: var(--text); text-decoration: none; font-size: 1.4rem; line-height: 1;
            transition: background .15s;
        }
        .month-nav__arrow:hover { background: var(--bg-elevated); }
        .month-nav__arrow--disabled { opacity: .35; pointer-events: none; }

        /* ── Content width cap ───────────────────────────────────────────── */
        .app-content { max-width: 1400px; }

        /* ── Tables ──────────────────────────────────────────────────────── */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td {
            text-align: left; padding: 10px 12px;
            border-bottom: 1px solid var(--border-subtle);
            word-break: break-word; overflow-wrap: break-word;
        }
        th { background: var(--bg-surface); font-weight: 600; font-size: 0.9rem; color: var(--text-subtle); white-space: nowrap; }
        tr:hover td { background: var(--bg-surface); }
        .empty { color: var(--text-muted); font-style: italic; margin-top: 20px; }
        .nowrap { white-space: nowrap; }

        /* ── Responsive card-table (opt-in via .resp-table) ─────────────── */
        @media (max-width: 1200px) {
            .col-hide-md { display: none; }
        }

        @media (max-width: 640px) {
            .resp-table, .resp-table tbody, .resp-table tr { display: block; }
            .resp-table thead { display: none; }
            .resp-table tr {
                background: var(--bg-surface); border: 1px solid var(--border);
                border-radius: 10px; margin-bottom: 12px; padding: 4px 0;
            }
            .resp-table tr:hover td { background: transparent; }
            .resp-table td {
                display: flex; align-items: flex-start; gap: 12px;
                padding: 8px 14px; border-bottom: 1px solid var(--border-subtle);
            }
            .resp-table td:last-child { border-bottom: none; }
            .resp-table td::before {
                content: attr(data-label);
                font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
                letter-spacing: .05em; color: var(--text-muted);
                min-width: 80px; flex-shrink: 0; padding-top: 2px;
            }
            .resp-table td[data-label=""]::before { display: none; min-width: 0; }
            .resp-table td[data-label=""] { padding-top: 6px; }
            .resp-table .tag-list { flex-wrap: wrap; }
            .resp-table .actions { flex-wrap: wrap; }
        }

        /* ── Badges ──────────────────────────────────────────────────────── */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.78rem; font-weight: 600; white-space: nowrap; }
        .badge-income      { background: #d4edda; color: #155724; }
        .badge-expense     { background: #f8d7da; color: #721c24; }
        .badge-savings_dep { background: var(--sav-dep-bg); color: var(--sav-dep-fg); }
        .badge-savings_wit { background: var(--sav-wit-bg); color: var(--sav-wit-fg); }
        .badge-tag         { background: var(--bg-elevated); color: var(--text-subtle); margin: 1px; }
        @media (prefers-color-scheme: dark) {
            .badge-income  { background: #1a3326; color: #6ecf8a; }
            .badge-expense { background: #331a1d; color: #cf7075; }
        }

        /* ── Mobile ──────────────────────────────────────────────────────── */
        @media (max-width: 768px) {
            header { padding: 0 16px; }
            .hamburger { display: flex; }

            .sidebar {
                position: fixed; top: 56px; left: 0;
                height: calc(100vh - 56px);
                width: 240px; z-index: 150;
                transform: translateX(-110%);
                transition: transform .25s ease;
                overflow-y: auto;
            }
            body.nav-open .sidebar { transform: translateX(0); }

            .app-main { padding: 20px 16px; }
            main { padding: 0 16px; margin: 24px auto; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% include "partials/_header.html" %}
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    {% block layout %}
    <main>
        {% block content %}{% endblock %}
    </main>
    {% endblock %}
    {% include "partials/_footer.html" %}
    <script>
    (function() {
        const ham = document.getElementById('hamburger');
        const overlay = document.getElementById('sidebar-overlay');
        if (!ham) return;
        function toggle() { document.body.classList.toggle('nav-open'); }
        ham.addEventListener('click', toggle);
        overlay.addEventListener('click', toggle);
    })();
    </script>
</body>
</html>
