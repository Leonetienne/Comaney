{% include 'partials/_image_cropper.html' %}

<div id="dummy-pic-modal" class="cdialog-backdrop" style="z-index:550;">
    <div class="cdialog">
        <p class="cdialog-title" id="dummy-pic-title">Upload picture</p>
        <div class="ppic-settings-row">
            <div id="dummy-pic-preview"></div>
            <div class="ppic-settings-actions">
                <label for="dummy-pic-input" class="btn btn-secondary btn-sm" style="cursor:pointer;">Choose image</label>
                <input type="file" id="dummy-pic-input" accept="image/*" style="display:none;">
                <button type="button" id="dummy-pic-delete" class="btn btn-danger btn-sm" style="display:none;">Remove</button>
            </div>
        </div>
        <p class="in-page-tip" style="margin-top:12px;margin-bottom:0;">JPEG, PNG, GIF or WebP. Max 5 MB.</p>
        <p id="dummy-pic-error" class="error-msg" style="display:none;margin-top:8px;"></p>
        <div class="cdialog-actions" style="margin-top:16px;">
            <button type="button" id="dummy-pic-close" class="btn btn-secondary">Close</button>
        </div>
    </div>
</div>

<script>
(function () {
    var modal      = document.getElementById('dummy-pic-modal');
    var titleEl    = document.getElementById('dummy-pic-title');
    var previewEl  = document.getElementById('dummy-pic-preview');
    var fileInput  = document.getElementById('dummy-pic-input');
    var deleteBtn  = document.getElementById('dummy-pic-delete');
    var closeBtn   = document.getElementById('dummy-pic-close');
    var errorEl    = document.getElementById('dummy-pic-error');

    var currentId       = null;
    var currentInitials = '';
    var currentColor    = '';

    function getCsrf() {
        var m = document.cookie.match(/csrftoken=([^;]+)/);
        return m ? m[1] : '';
    }

    function setPreview(blobUrl, initials, color) {
        previewEl.innerHTML = '';
        if (blobUrl) {
            var img = document.createElement('img');
            img.src = blobUrl;
            img.className = 'user-avatar user-avatar--lg';
            img.alt = '';
            previewEl.appendChild(img);
            deleteBtn.style.display = '';
        } else {
            var span = document.createElement('span');
            span.className = 'user-avatar user-avatar--lg user-avatar--initials';
            span.style.background = color;
            span.textContent = initials;
            previewEl.appendChild(span);
            deleteBtn.style.display = 'none';
        }
    }

    function updateListAvatar(id, blobUrl, initials, color) {
        var el = document.querySelector('[data-dummy-avatar="' + id + '"]');
        if (!el) return;
        var replacement;
        if (blobUrl) {
            replacement = document.createElement('img');
            replacement.src = blobUrl;
            replacement.className = 'user-avatar';
            replacement.alt = '';
        } else {
            replacement = document.createElement('span');
            replacement.className = 'user-avatar user-avatar--initials';
            replacement.style.background = color;
            replacement.textContent = initials;
        }
        replacement.setAttribute('data-dummy-avatar', id);
        el.replaceWith(replacement);
    }

    window.openDummyPicModal = function (btn) {
        currentId       = btn.dataset.dummyId;
        currentInitials = btn.dataset.initials;
        currentColor    = btn.dataset.avatarColor;
        var hasPic      = btn.dataset.hasPic === '1';
        var ppicUrl     = btn.dataset.ppicUrl;

        titleEl.textContent = btn.dataset.dummyName;
        errorEl.style.display = 'none';
        fileInput.value = '';
        setPreview(hasPic ? ppicUrl + '?t=' + Date.now() : null, currentInitials, currentColor);
        modal.classList.add('cdialog-visible');
    };

    function close() {
        modal.classList.remove('cdialog-visible');
        fileInput.value = '';
        currentId = null;
    }

    closeBtn.addEventListener('click', close);

    window.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && modal.classList.contains('cdialog-visible')) {
            close();
        }
    });

    fileInput.addEventListener('change', function () {
        var file = fileInput.files[0];
        if (!file || !currentId) return;
        fileInput.value = '';

        window.ImageCropper.open(file, function (blob) {
            errorEl.style.display = 'none';
            var fd = new FormData();
            fd.append('csrfmiddlewaretoken', getCsrf());
            fd.append('action', 'picture');
            fd.append('profile_picture', blob, 'profile.jpg');

            fetch('/buddies/dummy/' + currentId + '/picture/', { method: 'POST', body: fd })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.ok) {
                        var blobUrl = URL.createObjectURL(blob);
                        setPreview(blobUrl, currentInitials, currentColor);
                        updateListAvatar(currentId, blobUrl, currentInitials, currentColor);
                        var trigger = document.querySelector('[data-dummy-id="' + currentId + '"]');
                        if (trigger) trigger.dataset.hasPic = '1';
                    } else {
                        errorEl.textContent = data.error || 'Upload failed.';
                        errorEl.style.display = '';
                    }
                })
                .catch(function () {
                    errorEl.textContent = 'Upload failed.';
                    errorEl.style.display = '';
                });
        });
    });

    deleteBtn.addEventListener('click', function () {
        if (!currentId) return;
        var fd = new FormData();
        fd.append('csrfmiddlewaretoken', getCsrf());
        fd.append('action', 'picture_delete');

        fetch('/buddies/dummy/' + currentId + '/picture/', { method: 'POST', body: fd })
            .then(function (r) { return r.json(); })
            .then(function (data) {
                if (data.ok) {
                    setPreview(null, currentInitials, currentColor);
                    updateListAvatar(currentId, null, currentInitials, currentColor);
                    var trigger = document.querySelector('[data-dummy-id="' + currentId + '"]');
                    if (trigger) trigger.dataset.hasPic = '0';
                } else {
                    errorEl.textContent = data.error || 'Could not remove picture.';
                    errorEl.style.display = '';
                }
            })
            .catch(function () {
                errorEl.textContent = 'Could not remove picture.';
                errorEl.style.display = '';
            });
    });
}());
</script>
