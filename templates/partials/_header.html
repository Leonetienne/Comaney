<header>
    <div class="header-left">
        <button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
        <a class="brand" href="{% url 'hello_world' %}">Comoney</a>
    </div>
    <nav>
        {% if current_feuser %}
            <span class="user-name">{{ current_feuser.first_name }} {{ current_feuser.last_name }}</span>
            <form method="post" action="{% url 'logout' %}" style="margin:0">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>
        {% else %}
            <a href="{% url 'login' %}">Log In</a>
            {% if registration_enabled %}<a href="{% url 'register' %}">Register</a>{% endif %}
        {% endif %}
    </nav>
</header>
