<header>
    <div class="header-left">
        {% if current_feuser %}<button class="hamburger" id="hamburger" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>{% endif %}
        {% load static %}
        <a class="brand" href="{% url 'landing_page' %}">
            <img src="{% static 'favicon.svg' %}" alt="" class="brand-logo">Comaney
        </a>
    </div>
    <nav>
        {% if current_feuser %}
            <span class="header-user-actions">
                <span class="user-name">{{ current_feuser.first_name }} {{ current_feuser.last_name }}</span>
                <form method="post" action="{% url 'logout' %}" style="margin:0">
                    {% csrf_token %}
                    <button type="submit" id="logout-button">Logout</button>
                </form>
            </span>
        {% else %}
            <a href="{% url 'login' %}">Log In</a>
            {% if registration_enabled %}<a href="{% url 'register' %}">Register</a>{% endif %}
        {% endif %}
    </nav>
</header>
