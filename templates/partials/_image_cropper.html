<div id="img-cropper-modal" style="display:none;">
    <div class="img-cropper-dialog">
        <p class="img-cropper-hint">Drag to reposition &middot; Scroll or pinch to zoom</p>
        <canvas id="img-cropper-canvas" width="300" height="300"></canvas>
        <div class="img-cropper-actions">
            <button type="button" id="img-cropper-cancel" class="btn btn-secondary">Cancel</button>
            <button type="button" id="img-cropper-done" class="btn">Done</button>
        </div>
    </div>
</div>

<script>
(function () {
    'use strict';

    var modal     = document.getElementById('img-cropper-modal');
    var canvas    = document.getElementById('img-cropper-canvas');
    var ctx       = canvas.getContext('2d');
    var cancelBtn = document.getElementById('img-cropper-cancel');
    var doneBtn   = document.getElementById('img-cropper-done');

    /* ── per-open state ─────────────────────────────────────────── */

    var img          = null;
    var scale        = 1;
    var offsetX      = 0;
    var offsetY      = 0;
    var dragging     = false;
    var lastX        = 0;
    var lastY        = 0;
    var doneCallback = null;

    /* ── current-mode config (set in setup()) ───────────────────── */

    var mode = 'circle';   // 'circle' | 'rect'
    var CX, CY;
    var CIRCLE_R;           // circle mode
    var CROP_W, CROP_H;     // rect mode

    function setup(opts) {
        opts = opts || {};
        mode = (opts.shape === 'rect') ? 'rect' : 'circle';

        if (mode === 'rect') {
            var ratio  = opts.aspectRatio || 3;
            CROP_H     = opts.cropH || 140;
            CROP_W     = Math.round(CROP_H * ratio);
            canvas.width  = CROP_W + 60;
            canvas.height = CROP_H + 60;
        } else {
            canvas.width  = 300;
            canvas.height = 300;
            CIRCLE_R      = 120;
        }

        CX = canvas.width  / 2;
        CY = canvas.height / 2;
    }

    /* ── helpers ────────────────────────────────────────────────── */

    function minScale() {
        if (mode === 'rect') {
            return Math.max(CROP_W / img.naturalWidth, CROP_H / img.naturalHeight);
        }
        return Math.max((CIRCLE_R * 2) / img.naturalWidth,
                        (CIRCLE_R * 2) / img.naturalHeight);
    }

    function clamp() {
        var hw = img.naturalWidth  * scale / 2;
        var hh = img.naturalHeight * scale / 2;
        var halfW = (mode === 'rect') ? CROP_W / 2 : CIRCLE_R;
        var halfH = (mode === 'rect') ? CROP_H / 2 : CIRCLE_R;
        offsetX = Math.max(CX + halfW - hw, Math.min(CX - halfW + hw, offsetX));
        offsetY = Math.max(CY + halfH - hh, Math.min(CY - halfH + hh, offsetY));
    }

    function draw() {
        var w = img.naturalWidth  * scale;
        var h = img.naturalHeight * scale;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        /* image */
        ctx.drawImage(img, offsetX - w / 2, offsetY - h / 2, w, h);

        /* scrim outside crop region */
        ctx.save();
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.beginPath();
        ctx.rect(0, 0, canvas.width, canvas.height);
        if (mode === 'rect') {
            ctx.rect(CX - CROP_W / 2, CY - CROP_H / 2, CROP_W, CROP_H);
        } else {
            ctx.arc(CX, CY, CIRCLE_R, 0, Math.PI * 2);
        }
        ctx.fill('evenodd');
        ctx.restore();

        /* crop region border */
        ctx.save();
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        if (mode === 'rect') {
            ctx.rect(CX - CROP_W / 2, CY - CROP_H / 2, CROP_W, CROP_H);
        } else {
            ctx.arc(CX, CY, CIRCLE_R, 0, Math.PI * 2);
        }
        ctx.stroke();
        ctx.restore();
    }

    function applyZoom(newScale) {
        newScale = Math.max(minScale(), Math.min(6, newScale));
        var ratio = newScale / scale;
        /* always zoom into the center of the crop viewport */
        offsetX = CX - (CX - offsetX) * ratio;
        offsetY = CY - (CY - offsetY) * ratio;
        scale   = newScale;
        clamp();
        draw();
    }

    function initImage(imageEl) {
        img     = imageEl;
        scale   = minScale();
        offsetX = CX;
        offsetY = CY;
        clamp();
        draw();
    }

    /* ── mouse drag ─────────────────────────────────────────────── */

    canvas.addEventListener('mousedown', function (e) {
        dragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
        canvas.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', function (e) {
        if (!dragging) return;
        offsetX += e.clientX - lastX;
        offsetY += e.clientY - lastY;
        lastX = e.clientX;
        lastY = e.clientY;
        clamp();
        draw();
    });

    window.addEventListener('mouseup', function () {
        dragging = false;
        canvas.style.cursor = 'grab';
    });

    /* ── touch drag + pinch zoom ────────────────────────────────── */

    var lastTouchX = 0;
    var lastTouchY = 0;
    var lastPinchDist = 0;

    canvas.addEventListener('touchstart', function (e) {
        e.preventDefault();
        if (e.touches.length === 2) {
            var dx = e.touches[0].clientX - e.touches[1].clientX;
            var dy = e.touches[0].clientY - e.touches[1].clientY;
            lastPinchDist = Math.hypot(dx, dy);
        } else {
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
        }
    }, { passive: false });

    canvas.addEventListener('touchmove', function (e) {
        e.preventDefault();
        if (e.touches.length === 2) {
            var dx = e.touches[0].clientX - e.touches[1].clientX;
            var dy = e.touches[0].clientY - e.touches[1].clientY;
            var dist = Math.hypot(dx, dy);
            if (lastPinchDist > 0) {
                applyZoom(scale * (dist / lastPinchDist));
            }
            lastPinchDist = dist;
        } else {
            offsetX += e.touches[0].clientX - lastTouchX;
            offsetY += e.touches[0].clientY - lastTouchY;
            lastTouchX = e.touches[0].clientX;
            lastTouchY = e.touches[0].clientY;
            clamp();
            draw();
        }
    }, { passive: false });

    canvas.addEventListener('touchend', function () { lastPinchDist = 0; });

    /* ── scroll zoom ────────────────────────────────────────────── */

    canvas.addEventListener('wheel', function (e) {
        e.preventDefault();
        var factor = e.deltaY < 0 ? 1.08 : 0.93;
        applyZoom(scale * factor);
    }, { passive: false });

    /* ── keyboard ────────────────────────────────────────────────── */

    window.addEventListener('keydown', function (e) {
        if (modal.style.display !== 'none' && e.key === 'Escape') {
            close();
        }
    });

    /* ── buttons ─────────────────────────────────────────────────── */

    function close() {
        modal.style.display = 'none';
        doneBtn.disabled = false;
        doneBtn.textContent = 'Done';
    }

    cancelBtn.addEventListener('click', close);

    doneBtn.addEventListener('click', function () {
        var out    = document.createElement('canvas');
        var outCtx = out.getContext('2d');
        var w      = img.naturalWidth  * scale;
        var h      = img.naturalHeight * scale;
        var imgLeft = offsetX - w / 2;
        var imgTop  = offsetY - h / 2;

        if (mode === 'rect') {
            out.width  = CROP_W;
            out.height = CROP_H;
            var srcX = (CX - CROP_W / 2 - imgLeft) / scale;
            var srcY = (CY - CROP_H / 2 - imgTop)  / scale;
            var srcW = CROP_W / scale;
            var srcH = CROP_H / scale;
            outCtx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, CROP_W, CROP_H);
        } else {
            var outSize = CIRCLE_R * 2;
            out.width  = outSize;
            out.height = outSize;
            var srcX = (CX - CIRCLE_R - imgLeft) / scale;
            var srcY = (CY - CIRCLE_R - imgTop)  / scale;
            var srcW = (CIRCLE_R * 2) / scale;
            var srcH = (CIRCLE_R * 2) / scale;
            outCtx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, outSize, outSize);
        }

        out.toBlob(function (blob) {
            if (doneCallback) doneCallback(blob);
            close();
        }, 'image/jpeg', 0.88);

        doneBtn.disabled = true;
        doneBtn.textContent = 'Processing…';
    });

    /* ── public API ──────────────────────────────────────────────── */

    window.ImageCropper = {
        /**
         * Open the cropper for the given File.
         * opts (optional): { shape: 'rect', aspectRatio: 3, cropH: 140 }
         *   Defaults to circle mode (profile picture behaviour).
         */
        open: function (file, callback, opts) {
            setup(opts);
            doneCallback = callback;
            var reader = new FileReader();
            reader.onload = function (e) {
                var imageEl = new Image();
                imageEl.onload = function () {
                    initImage(imageEl);
                    modal.style.display = 'flex';
                    canvas.style.cursor = 'grab';
                };
                imageEl.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
    };
}());
</script>
