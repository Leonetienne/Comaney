<details class="bexp-collapsible">
    <summary class="bexp-collapsible-summary">Show more info...</summary>
    <table class="bexp-breakdown-table">
        <thead>
            <tr><th>Person</th><th class="text-right">Share</th><th class="text-right">Amount</th><th>Role</th></tr>
        </thead>
        <tbody>
            <tr class="{% if e.payer_is_me %}bexp-row-me{% endif %}">
                <td>{{ e.payer_name }}</td>
                <td class="text-right">{{ e.payer_percent|floatformat:1 }}%</td>
                <td class="text-right">{{ currency }}{{ e.payer_amount|floatformat:2 }}</td>
                <td><span class="pill">Paid</span></td>
            </tr>
            {% for s in e.participant_shares %}
            <tr class="{% if s.is_me %}bexp-row-me{% endif %}">
                <td>{{ s.name }}</td>
                <td class="text-right">{{ s.percent|floatformat:1 }}%</td>
                <td class="text-right">{{ currency }}{{ s.amount|floatformat:2 }}</td>
                <td><span class="pill">Owes</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</details>
