{% block content %}
<h2 style="margin:0 0 16px;font-size:1.2rem;color:#e0e0e0;">Partnership invitation declined</h2>
<p style="color:#ccc;line-height:1.6;">
    <strong style="color:#e0e0e0;">{{ invitee_name }}</strong> has declined your Catalog Partnership invitation.
</p>

    No changes were made to your catalog. You can invite them again from their profile at any time.
</p>
{% endblock %}
