<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block subject %}Comaney{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#141414;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#141414;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:580px;">

          <!-- Header -->
          <tr>
            <td style="padding-bottom:20px;text-align:center;">
              <a href="{{ site_url }}" style="text-decoration:none;font-size:1.5rem;font-weight:700;color:#e0e0e0;letter-spacing:-0.02em;">Comaney</a>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background:#1c1c1c;border:1px solid #333;border-radius:12px;padding:40px 40px 32px;">

              {% block content %}{% endblock %}

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 0 0;text-align:center;font-size:0.78rem;color:#555;line-height:1.6;">
              &copy; {% now "Y" %} Comaney &mdash;
              <a href="https://github.com/Leonetienne/Comaney" style="color:#555;text-decoration:underline;">Open Source on GitHub</a>
              <br>
              You received this email because an action was performed on your account.
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
