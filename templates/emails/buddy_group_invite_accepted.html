{% extends "emails/base_email.html" %}

{% block content %}
<h2 style="margin:0 0 16px;font-size:1.2rem;color:#e0e0e0;">New group member</h2>
<p style="color:#ccc;line-height:1.6;">
    <strong style="color:#e0e0e0;">{{ acceptee_name }}</strong> has accepted your invitation and joined the group <strong style="color:#e0e0e0;">{{ group_name }}</strong>.
</p>
<p style="color:#666;font-size:0.82rem;line-height:1.5;">
    You are receiving this because you are the group admin.
</p>
{% endblock %}
