<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misconfigured · Comaney</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        :root {
            --bg: #fff; --text: #333; --text-muted: #888;
            --border: #ddd; --link: #c2478a; --warn: #c0392b;
        }
        @media (prefers-color-scheme: dark) {
            :root { --bg: #141414; --text: #e0e0e0; --text-muted: #666; --border: #333; --link: #e06aaa; --warn: #e05a4a; }
        }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: var(--text); }
        header {
            display: flex; align-items: center; padding: 0 24px; height: 56px;
            border-bottom: 1px solid var(--border); background: var(--bg);
        }
        header a { font-weight: 700; font-size: 1.1rem; text-decoration: none; color: var(--text); }
        .error-page {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; text-align: center; padding: 80px 24px;
            min-height: calc(100vh - 57px);
        }
        .error-page-code {
            font-size: clamp(6rem, 20vw, 10rem); font-weight: 700; line-height: 1;
            color: var(--warn); opacity: 0.2; letter-spacing: -4px; margin-bottom: 16px; user-select: none;
        }
        .error-page-title { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 600; margin: 0 0 12px; color: var(--warn); }
        .error-page-message {
            font-size: 1rem; color: var(--text-muted); max-width: 480px; margin: 0 0 32px; line-height: 1.6;
            background: color-mix(in srgb, var(--warn) 8%, transparent);
            border: 1px solid color-mix(in srgb, var(--warn) 30%, transparent);
            border-radius: 8px; padding: 16px 20px; text-align: left; color: var(--text);
            font-family: monospace; font-size: 0.9rem;
        }
        .hint { font-size: 0.875rem; color: var(--text-muted); max-width: 400px; line-height: 1.5; }
    </style>
</head>
<body>
<header><a href="/">Comaney</a></header>
<div class="error-page">
    <div class="error-page-code">!</div>
    <h1 class="error-page-title">Misconfiguration</h1>
    <p class="error-page-message">{{ message }}</p>
    <p class="hint">Fix the configuration and restart the container.</p>
</div>
</body>
</html>
