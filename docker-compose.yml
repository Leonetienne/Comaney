services:
  db:
    image: mariadb:11.3
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: comaney
      MARIADB_USER: comaney
      MARIADB_PASSWORD: comaney
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8030:8025"
      - "1025:1025"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8080:8000"
    environment:
      DJANGO_SECRET_KEY: dev-secret-key
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: comaney
      DB_USER: comaney
      DB_PASSWORD: comaney
      SITE_URL: http://localhost:8080
      DEBUG: "TRUE"
      ENABLE_REGISTRATION: "TRUE"
      EMAIL_HOST: mailpit
      EMAIL_PORT: 1025
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
