{% extends "base.html" %}

{% block title %}Comaney{% endblock %}

{% block content %}
<div style="text-align:center; padding: 60px 0;">
    <h1 style="font-size:2rem; margin-bottom:8px;">Comaney</h1>
    <p style="color:var(--text-muted); margin-bottom:32px;">Personal budget tracking.</p>

    {% if registration_enabled %}
    <a href="{% url 'register' %}" class="btn" style="margin-right:8px;">Register now</a>
    <a href="{% url 'login' %}" class="btn btn-secondary">Log in</a>
    {% else %}
    <p style="color:var(--text-muted); margin-bottom:16px;">This is a private instance.</p>
    <a href="{% url 'login' %}" class="btn">Log in</a>
    {% endif %}
</div>
{% endblock %}
