{% extends "base.html" %}

{% block title %}Comoney – Registrieren{% endblock %}

{% block extra_head %}
<style>
    main { max-width: 480px; }
</style>
{% endblock %}

{% block content %}
<h1>Registrieren</h1>
<form method="post" novalidate>
    {% csrf_token %}
    {% for field in form %}
    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
    {{ field }}
    {% for error in field.errors %}
    <p class="error-msg">{{ error }}</p>
    {% endfor %}
    {% endfor %}
    <button type="submit" class="btn btn-full">Konto erstellen</button>
</form>
{% endblock %}
